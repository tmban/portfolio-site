<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thomas Mbanefo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── THEME TOKENS ── */
:root {
  --bg:              #ffffff;
  --board-bg-top:    #f5f5f7;
  --board-bg-bot:    #eaeaec;
  --board-shadow:    #c8c8cc;
  --board-ambient:   rgba(0,0,0,0.13);
  --key-base:        #1a1a2e;
  --key-top-top:     #2d2d4e;
  --key-top-bot:     #1e1e38;
  --nameplate-name:  #1a1a1a;
  --nameplate-role:  #aaaaaa;
  --hint-color:      #bbbbbb;
  --hint-line:       #dddddd;
  --tooltip-bg:      #1a1a2e;
  --tooltip-color:   #ffffff;
  --flash-bg:        #ffffff;
  --toggle-bg:       #e0e0e4;
  --toggle-thumb:    #1a1a2e;
  --toggle-label:    #999999;
  --toggle-active:   #1a1a2e;
}

[data-theme="dark"] {
  --bg:              #0d0d14;
  --board-bg-top:    #18182a;
  --board-bg-bot:    #111120;
  --board-shadow:    #08080f;
  --board-ambient:   rgba(0,0,0,0.5);
  --key-base:        #060610;
  --key-top-top:     #1a1a30;
  --key-top-bot:     #0f0f22;
  --nameplate-name:  #e8e8e8;
  --nameplate-role:  #666680;
  --hint-color:      #44445a;
  --hint-line:       #22222e;
  --tooltip-bg:      #e8e8f0;
  --tooltip-color:   #1a1a2e;
  --flash-bg:        #0d0d14;
  --toggle-bg:       #1e1e30;
  --toggle-thumb:    #FF2D87;
  --toggle-label:    #44445a;
  --toggle-active:   #e8e8e8;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  transition: background 0.45s ease;
}

/* ── HERO WRAPPER ── */
.hero {
  width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  background: var(--bg);
  transition: background 0.45s ease;
}

/* ── BOARD ── */
.board {
  background: linear-gradient(180deg, var(--board-bg-top) 0%, var(--board-bg-bot) 100%);
  border-radius: clamp(20px, 3vw, 36px);
  padding: clamp(24px, 3.5vw, 48px) clamp(28px, 4vw, 56px) clamp(32px, 4.5vw, 60px);
  box-shadow:
    0 4px 0 var(--board-shadow),
    0 8px 40px var(--board-ambient),
    inset 0 1px 0 rgba(255,255,255,0.9);
  position: relative;
  transition: background 0.45s ease, box-shadow 0.45s ease;
}

/* ── KEYS ROW ── */
.keys-row {
  display: flex;
  gap: clamp(16px, 2.5vw, 36px);
  align-items: flex-end;
}

/* ── KEY ── */
.key {
  position: relative;
  width: clamp(140px, 18vw, 260px);
  height: clamp(140px, 18vw, 260px);
  cursor: pointer;
  user-select: none;
  opacity: 0;
  transform: translateY(-40px);
}

.key-t { animation: drop-in 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.2s forwards; }
.key-m { animation: drop-in 0.65s cubic-bezier(0.34,1.56,0.64,1) 0.45s forwards; }

@keyframes drop-in { to { opacity: 1; transform: translateY(0); } }

.key-base {
  position: absolute;
  bottom: 0; left: 0;
  width: 100%;
  height: 91%;
  border-radius: clamp(12px, 1.8vw, 22px);
  background: var(--key-base);
  transition: height 0.08s ease, background 0.45s ease;
}

.key-top {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 91%;
  border-radius: clamp(10px, 1.6vw, 20px);
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(160deg, var(--key-top-top) 0%, var(--key-top-bot) 100%);
  transition: transform 0.08s ease, box-shadow 0.08s ease, background 0.45s ease;
  box-shadow:
    inset 0 3px 0 rgba(255,255,255,0.55),
    inset 0 -3px 0 rgba(0,0,0,0.18),
    inset 3px 0 0 rgba(255,255,255,0.18),
    inset -3px 0 0 rgba(0,0,0,0.12);
}

.key-letter {
  font-family: 'DM Mono', monospace;
  font-size: clamp(60px, 8vw, 120px);
  font-weight: 400;
  line-height: 1;
  position: relative;
  top: -4px;
  transition: transform 0.08s ease;
  background: linear-gradient(135deg, #FF5F35 0%, #FF2D87 55%, #A020F0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 18px rgba(255,45,135,0.45));
}

/* Pressed state */
.key.pressed .key-top {
  transform: translateY(10px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.35),
    inset 0 -1px 0 rgba(0,0,0,0.25),
    inset 2px 0 0 rgba(255,255,255,0.1),
    inset -2px 0 0 rgba(0,0,0,0.15);
}
.key.pressed .key-base { height: 83%; }
.key.pressed .key-letter { transform: translateY(2px); }

/* ── TOOLTIP on hover ── */
.key-tooltip {
  position: absolute;
  bottom: calc(100% + 14px);
  left: 50%;
  transform: translateX(-50%) translateY(6px);
  background: var(--tooltip-bg);
  color: var(--tooltip-color);
  font-family: 'DM Mono', monospace;
  font-size: clamp(9px, 1vw, 12px);
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  white-space: nowrap;
  padding: 8px 14px;
  border-radius: 6px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.18s ease, transform 0.18s ease, background 0.45s ease, color 0.45s ease;
}

.key-tooltip::after {
  content: '';
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: var(--tooltip-bg);
  transition: border-top-color 0.45s ease;
}

.key:hover .key-tooltip {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── LED ── */
.led {
  position: absolute;
  bottom: clamp(10px, 1.5vw, 18px);
  right: clamp(14px, 2vw, 24px);
  width: clamp(5px, 0.6vw, 8px);
  height: clamp(5px, 0.6vw, 8px);
  border-radius: 50%;
  background: #FF2D87;
  box-shadow: 0 0 8px 3px rgba(255,45,135,0.55);
  opacity: 0;
  animation: led-on 0.3s ease 1.5s forwards;
}
@keyframes led-on { to { opacity: 1; } }

/* ── NAMEPLATE ── */
.nameplate {
  margin-top: clamp(24px, 3.5vw, 48px);
  text-align: center;
  opacity: 0;
  transform: translateY(12px);
  animation: fade-up 0.6s ease 1.4s forwards;
}
@keyframes fade-up { to { opacity: 1; transform: translateY(0); } }

.wm {
  font-size: clamp(11px, 1.2vw, 15px);
  font-weight: 300;
  letter-spacing: clamp(4px, 0.6vw, 7px);
  color: var(--nameplate-name);
  text-transform: uppercase;
  transition: color 0.45s ease;
}
.rl {
  font-size: clamp(8px, 0.9vw, 11px);
  font-weight: 300;
  letter-spacing: clamp(3px, 0.5vw, 5.5px);
  color: var(--nameplate-role);
  text-transform: uppercase;
  margin-top: 8px;
  transition: color 0.45s ease;
}

/* ── CLICK-TO-ENTER HINT ── */
.enter-hint {
  position: absolute;
  bottom: clamp(28px, 4vh, 52px);
  left: 50%;
  transform: translateX(-50%);
  font-family: 'DM Mono', monospace;
  font-size: clamp(9px, 0.85vw, 11px);
  font-weight: 300;
  letter-spacing: 4px;
  color: var(--hint-color);
  text-transform: uppercase;
  opacity: 0;
  animation: fade-up 0.6s ease 2s forwards;
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
  transition: color 0.45s ease;
}

.enter-hint::before,
.enter-hint::after {
  content: '';
  width: clamp(20px, 3vw, 48px);
  height: 1px;
  background: var(--hint-line);
  display: block;
  transition: background 0.45s ease;
}

  /* ── TOGGLE ── */
  /* ── THEME TOGGLE (sticky bottom) ── */
  .theme-toggle {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 200;
    background: var(--nav-bg);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.10);
  }
  .toggle-label {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--toggle-lbl); transition: color 0.4s ease; user-select: none;
  }
  .toggle-label.active { color: var(--toggle-act); }
  .toggle-track {
    position: relative; width: 36px; height: 20px; border-radius: 10px;
    background: var(--toggle-bg); cursor: pointer;
    transition: background 0.4s ease; flex-shrink: 0;
  }
  .toggle-track::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--toggle-thumb);
    transition: transform 0.32s cubic-bezier(0.34,1.4,0.64,1), background 0.4s ease;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  [data-theme="dark"] .toggle-track::after { transform: translateX(16px); }

  /* Mobile icon button — hidden on desktop */
  .toggle-icon-btn {
    display: none;
  }

@media (max-width: 680px) {
  /* Theme toggle: hide pill, show icon button */
  .theme-toggle {
    bottom: 20px;
    padding: 0;
    background: none;
    border: none;
    box-shadow: none;
    backdrop-filter: none;
    gap: 0;
  }
  .toggle-label, .toggle-track { display: none; }
  .toggle-icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--nav-bg);
    backdrop-filter: blur(14px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    cursor: pointer;
    color: var(--toggle-act);
    transition: background 0.3s, color 0.3s;
  }
  /* Show sun in dark mode, moon in light mode */
  .icon-sun { display: none; }
  .icon-moon { display: block; }
  [data-theme="dark"] .icon-sun { display: block; }
  [data-theme="dark"] .icon-moon { display: none; }
}

/* ── FLASH OVERLAY ── */
.flash {
  position: fixed;
  inset: 0;
  background: var(--flash-bg);
  opacity: 0;
  pointer-events: none;
  z-index: 999;
  transition: opacity 0.35s ease, background 0.45s ease;
}
.flash.active { opacity: 1; }
</style>
</head>
<body>

  

<div class="hero">
  <div class="board">
    <div class="keys-row">

      <!-- T KEY -->
      <div class="key key-t" id="keyT">
        <div class="key-tooltip">Click to enter</div>
        <div class="key-base"></div>
        <div class="key-top"><span class="key-letter">T</span></div>
      </div>

      <!-- M KEY -->
      <div class="key key-m" id="keyM">
        <div class="key-tooltip">Click to enter</div>
        <div class="key-base"></div>
        <div class="key-top"><span class="key-letter">M</span></div>
      </div>

    </div>
    <div class="led"></div>
  </div>

  <div class="nameplate">
    <div class="wm">Thomas Mbanefo</div>
    <div class="rl">Product Designer</div>
  </div>
</div>

<!-- THEME TOGGLE -->
<div class="theme-toggle" id="themeToggle">
  <span class="toggle-label active" id="labelLight">Light</span>
  <div class="toggle-track" id="toggleTrack" role="button" aria-label="Toggle dark mode" tabindex="0"></div>
  <span class="toggle-label" id="labelDark">Dark</span>
  <!-- Mobile icon button -->
  <button class="toggle-icon-btn" id="toggleIconBtn" aria-label="Toggle dark mode">
    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</div>

<div class="flash" id="flash"></div>

<script>
// ── Config ────────────────────────────────────────────
const HOMEPAGE = 'Home.html';

// ── Refs ──────────────────────────────────────────────
const T       = document.getElementById('keyT');
const M       = document.getElementById('keyM');
const flash   = document.getElementById('flash');
const html    = document.documentElement;
const track   = document.getElementById('toggleTrack');
const toggle  = document.getElementById('themeToggle');
const lblLight = document.getElementById('labelLight');
const lblDark  = document.getElementById('labelDark');

let isDark = false;
const saved = localStorage.getItem('theme');
if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
  isDark = true;
  html.setAttribute('data-theme', 'dark');
  updateLabels();
}

function updateLabels() {
  lblLight.classList.toggle('active', !isDark);
  lblDark.classList.toggle('active',  isDark);
}

function toggleTheme() {
  isDark = !isDark;
  html.setAttribute('data-theme', isDark ? 'dark' : 'light');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  updateLabels();
}

track.addEventListener('click', toggleTheme);
toggle.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleTheme(); }
});
const iconBtn = document.getElementById('toggleIconBtn');
if (iconBtn) iconBtn.addEventListener('click', toggleTheme);


// ── Navigate with flash ───────────────────────────────
function navigateTo(url) {
  flash.classList.add('active');
  setTimeout(() => { window.location.href = url; }, 380);
}

// ── Press util ────────────────────────────────────────
function pressKey(el, delay) {
  setTimeout(() => {
    el.classList.add('pressed');
    setTimeout(() => el.classList.remove('pressed'), 140);
  }, delay);
}

// ── Intro animation ───────────────────────────────────
pressKey(T, 900);
pressKey(M, 1150);
setTimeout(() => { pressKey(T, 0); pressKey(M, 0); }, 1600);

// ── Mouse interactions ────────────────────────────────
[T, M].forEach(key => {
  key.addEventListener('mousedown', () => key.classList.add('pressed'));
  key.addEventListener('mouseup',   () => key.classList.remove('pressed'));
  key.addEventListener('mouseleave',() => key.classList.remove('pressed'));
  key.addEventListener('click', () => {
    key.classList.add('pressed');
    setTimeout(() => { key.classList.remove('pressed'); navigateTo(HOMEPAGE); }, 160);
  });
});

// ── Keyboard interactions ─────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 't' || e.key === 'T') T.classList.add('pressed');
  if (e.key === 'm' || e.key === 'M') M.classList.add('pressed');
});
document.addEventListener('keyup', e => {
  if (e.key === 't' || e.key === 'T') { T.classList.remove('pressed'); navigateTo(HOMEPAGE); }
  if (e.key === 'm' || e.key === 'M') { M.classList.remove('pressed'); navigateTo(HOMEPAGE); }
});
</script>
</body>
</html>
