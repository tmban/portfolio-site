<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF5F35"/>
      <stop offset="55%"  stop-color="#FF2D87"/>
      <stop offset="100%" stop-color="#A020F0"/>
    </linearGradient>
    <linearGradient id="keyTop" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%"   stop-color="#2d2d4e"/>
      <stop offset="100%" stop-color="#1e1e38"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect x="2" y="6" width="44" height="42" rx="8" fill="#1a1a2e"/>
  <!-- Top face -->
  <rect x="2" y="2" width="44" height="42" rx="7" fill="url(#keyTop)"/>
  <!-- Top highlight -->
  <rect x="2" y="2" width="44" height="3" rx="7" fill="rgba(255,255,255,0.20)"/>
  <!-- Left highlight -->
  <rect x="2" y="2" width="3" height="42" rx="7" fill="rgba(255,255,255,0.11)"/>
  <!-- Bottom shadow -->
  <rect x="2" y="41" width="44" height="3" rx="4" fill="rgba(0,0,0,0.25)"/>
  <!-- Right shadow -->
  <rect x="43" y="2" width="3" height="42" rx="4" fill="rgba(0,0,0,0.15)"/>

  <!-- T letter -->
  <text x="24" y="34" font-family="'DM Mono', 'Courier New', monospace" font-size="30" font-weight="400"
        text-anchor="middle" fill="url(#grad)"
        filter="drop-shadow(0 0 6px rgba(255,45,135,0.55))">T</text>
</svg>
